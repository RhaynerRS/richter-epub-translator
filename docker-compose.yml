version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: python-api/dockerfile
    ports:
      - "8000:8000"
    volumes:
      - api_data:/data
    environment:
      - LLM_PROVIDER=deepseek
      - BASE_URL=https://api.deepseek.com
      - MODEL=deepseek-v4-flash
      - API_KEY=sk-50a8c5e9e98f400ba2c49b2316c91652
      # - BASE_URL=       # optional override, defaults to https://api.openai.com/v1
      # - MODEL=          # optional override, defaults to gpt-4o-mini
      # To use Ollama or DeepSeek instead, set LLM_PROVIDER accordingly —
      # API_KEY/BASE_URL/MODEL are the same three vars for every provider.
      # Ollama also needs the "ollama" service below and OLLAMA_NUM_CTX:
      #   LLM_PROVIDER=ollama
      #   API_KEY=ollama
      #   BASE_URL=http://ollama:11434/v1
      #   MODEL=qwen2.5:3b-instruct-q4_K_M
      #   OLLAMA_NUM_CTX=30000
      - MAX_GROUP_TOKENS=1000
      - TOKEN_ENCODING=cl100k_base
      - STORAGE_DIR=/data
      - JOB_WORKERS=4

      # --- CORS (opcional) ---
      # Origem do frontend liberada para chamar a API do navegador. Sem isso,
      # nenhuma origem cross-origin e liberada.
      # - FRONTEND_ORIGIN=http://localhost:5173

      # --- Login social: Google e GitHub sao opt-in separadamente ---
      # Cada flag so exige as credenciais do proprio provedor (falha no
      # startup se faltar alguma exigida). Defina os segredos em um .env na
      # raiz do repo (ja esta no .gitignore) para preencher os ${...} abaixo,
      # ou exporte-os no ambiente antes do "docker compose up".
      - GOOGLE_AUTH_ENABLED=false
      # - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      # - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # - GOOGLE_REDIRECT_URI=http://localhost:8000/auth/google/callback
      - GITHUB_AUTH_ENABLED=false
      # - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      # - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      # - GITHUB_REDIRECT_URI=http://localhost:8000/auth/github/callback
      # Necessario se GOOGLE_AUTH_ENABLED=true ou GITHUB_AUTH_ENABLED=true
      # - JWT_SECRET=${JWT_SECRET}
      # - JWT_ALGORITHM=HS256
      # - JWT_EXPIRES_MINUTES=10080
      # - OAUTH_STATE_TTL_SECONDS=600

      # --- Cobranca via Stripe (opt-in, default: false, exige login social habilitado) ---
      - PAYMENT_ENABLED=false
      # - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      # - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      # - STRIPE_CURRENCY=usd
      # - PRICE_PER_1K_TOKENS_CENTS=50
      # - MIN_CHARGE_CENTS=50
      # - PUBLIC_BASE_URL=http://localhost:8000
    labels:
      - "service_name=lexicast-api"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:rocm
    container_name: ollama-amdgpu
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull qwen2.5:3b-instruct-q4_K_M
        wait
    restart: unless-stopped

volumes:
  ollama_data:
  api_data:
