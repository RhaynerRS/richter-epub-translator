version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: python-api/dockerfile
    ports:
      - "8000:8000"
    volumes:
      - api_data:/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=qwen3
      - OLLAMA_API_KEY=ollama
      - TOKEN_ENCODING=cl100k_base
      - STORAGE_DIR=/data
      - JOB_WORKERS=4
    depends_on:
      - ollama
    labels:
      - "service_name=lexicast-api"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:rocm
    container_name: ollama-amdgpu
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    restart: unless-stopped

volumes:
  ollama_data:
  api_data:
